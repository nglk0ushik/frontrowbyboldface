// =====================
// MOBILE NAV
// =====================
function buildMobileNav() {
  const nav = document.getElementById('mobile-nav');
  if(!nav) return;
  if(CU.role === 'admin') {
    nav.innerHTML = `
      <div class="mob-nav-item" id="mn-dashboard" onclick="go('dashboard')">Home</div>
      <div class="mob-nav-item" id="mn-clients" onclick="go('clients')">Clients</div>
      <div class="mob-nav-item" id="mn-drafts" onclick="go('drafts')">Drafts<span class="mob-nav-badge" id="mob-notif" style="display:none"></span></div>
      <div class="mob-nav-item" id="mn-payments" onclick="go('payments')">Money</div>
      <div class="mob-nav-item" onclick="doLogout()" style="color:var(--red)">Sign Out</div>
    `;
  } else {
    nav.innerHTML = `
      <div class="mob-nav-item" id="mn-client-home" onclick="go('client-home')">Home</div>
      <div class="mob-nav-item" id="mn-client-payments" onclick="go('client-payments')">Payments</div>
      <div class="mob-nav-item" id="mn-client-drafts" onclick="go('client-drafts')">Drafts</div>
      <div class="mob-nav-item" onclick="doLogout()" style="color:var(--red)">Sign Out</div>
    `;
  }
}

function setMobileNav(page) {
  document.querySelectorAll('.mob-nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('mn-' + page);
  if(el) el.classList.add('active');
}

// =====================
// THREAD (COMMENTS)
// =====================
async function loadThread(postId) {
  const { data } = await db.from('threads').select('*').eq('post_id', postId).order('created_at', {ascending:true});
  return data || [];
}

function renderThread(messages, postId, isAdmin) {
  const isEmpty = messages.length === 0;
  const msgsHtml = isEmpty ? '<div class="thread-empty">No messages yet. Start the conversation.</div>' :
    messages.map(m => {
      const fromAdmin = m.sender === 'admin';
      const cls = fromAdmin ? 'from-admin' : 'from-client';
      const who = fromAdmin ? 'Koushik' : m.sender_name || 'Client';
      return `<div class="thread-msg ${cls}">
        <div class="thread-who">${who}</div>
        <div class="thread-bubble">${escHtml(m.message)}</div>
        <div class="thread-time">${fmtDateTime(m.created_at)}</div>
      </div>`;
    }).join('');

  return `
    <div style="margin-top:14px">
      <div class="section-label">Conversation</div>
      <div class="thread-container" id="thread-${postId}">${msgsHtml}</div>
      <div class="thread-input-row">
        <textarea id="thread-input-${postId}" placeholder="Type a message..." rows="1"></textarea>
        <button class="btn btn-primary btn-sm" onclick="sendThreadMessage('${postId}','${isAdmin?'admin':'client'}')">Send</button>
      </div>
    </div>`;
}

async function sendThreadMessage(postId, senderRole) {
  const input = document.getElementById('thread-input-' + postId);
  const message = (input ? input.value : '').trim();
  if(!message) return;

  const senderName = CU.name;
  const { error } = await db.from('threads').insert([{
    post_id: postId,
    sender: senderRole,
    sender_name: senderName,
    message
  }]);

  if(error) { toast('Error sending message.', 'error'); return; }

  // Mark unread for the other side
  if(senderRole === 'client') {
    await db.from('posts').update({ comment_unread: true, comment_at: new Date().toISOString() }).eq('id', postId);
  } else {
    await db.from('posts').update({ admin_replied: true }).eq('id', postId);
  }

  if(input) input.value = '';
  // Reload thread messages
  const messages = await loadThread(postId);
  const container = document.getElementById('thread-' + postId);
  if(container) {
    container.innerHTML = messages.map(m => {
      const fromAdmin = m.sender === 'admin';
      const cls = fromAdmin ? 'from-admin' : 'from-client';
      const who = fromAdmin ? 'Koushik' : m.sender_name || 'Client';
      return `<div class="thread-msg ${cls}">
        <div class="thread-who">${who}</div>
        <div class="thread-bubble">${escHtml(m.message)}</div>
        <div class="thread-time">${fmtDateTime(m.created_at)}</div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }
}

// =====================
// APPROVAL (CLIENT)
// =====================
async function approvePost(postId) {
  const { error } = await db.from('posts').update({
    client_approved: true,
    approved_at: new Date().toISOString()
  }).eq('id', postId);
  if(error) { toast('Error.', 'error'); return; }
  toast('Draft approved!', 'success');
  go('client-drafts');
}

// =====================
// SEARCH (ADMIN)
// =====================
async function renderSearch() {
  document.getElementById('pg-content').innerHTML = `
    <input type="text" class="search-bar" id="search-input" placeholder="Search clients, drafts, payments..." oninput="doSearch()" autofocus/>
    <div id="search-results"></div>
  `;
}

async function doSearch() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const results = document.getElementById('search-results');
  if(!q || q.length < 2) { results.innerHTML = '<div class="meta" style="text-align:center;padding:20px">Type to search...</div>'; return; }

  const [{ data: cl }, { data: po }, { data: pm }] = await Promise.all([
    db.from('clients').select('*'),
    db.from('posts').select('*, clients(name)'),
    db.from('payments').select('*, clients(name)')
  ]);

  const clients = (cl||[]).filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  );

  const posts = (po||[]).filter(p =>
    (p.title||'').toLowerCase().includes(q) ||
    (p.content||'').toLowerCase().includes(q) ||
    (p.month_year||'').toLowerCase().includes(q)
  );

  const payments = (pm||[]).filter(p =>
    (p.notes||'').toLowerCase().includes(q) ||
    (p.clients&&(p.clients.name||'').toLowerCase().includes(q))
  );

  if(!clients.length && !posts.length && !payments.length) {
    results.innerHTML = '<div class="meta" style="text-align:center;padding:20px">No results found.</div>';
    return;
  }

  let html = '';

  if(clients.length) {
    html += clients.map(c => `
      <div class="search-result" onclick="go('clients')">
        <div class="search-result-type">Client</div>
        <div class="search-result-title">${c.name}</div>
        <div class="search-result-sub">${c.company||''} ${c.package_name?'· '+c.package_name:''}</div>
      </div>`).join('');
  }

  if(posts.length) {
    html += posts.map(p => `
      <div class="search-result" onclick="go('drafts')">
        <div class="search-result-type">Draft · ${p.clients?p.clients.name:'—'}</div>
        <div class="search-result-title">${p.title||'Untitled'}</div>
        <div class="search-result-sub">${(p.content||'').substring(0,80)}...</div>
      </div>`).join('');
  }

  if(payments.length) {
    html += payments.map(p => `
      <div class="search-result" onclick="go('payments')">
        <div class="search-result-type">Payment · ${p.clients?p.clients.name:'—'}</div>
        <div class="search-result-title">&#8377;${Number(p.amount||0).toLocaleString()} · ${fmtDate(p.due_date)}</div>
        <div class="search-result-sub">${p.notes||''} · ${p.status}</div>
      </div>`).join('');
  }

  results.innerHTML = html;
}

// =====================
// CASHFLOW (ADMIN)
// =====================
async function renderCashflow() {
  const { data: pm } = await db.from('payments').select('*, clients(name)').order('due_date');
  const payments = pm || [];

  // Group by month
  const months = {};
  payments.forEach(p => {
    if(!p.due_date) return;
    const d = new Date(p.due_date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleDateString('en-IN', {month:'long', year:'numeric'});
    if(!months[key]) months[key] = { label, received: [], pending: [], key };
    if(p.status === 'received') months[key].received.push(p);
    else months[key].pending.push(p);
  });

  const sortedKeys = Object.keys(months).sort();
  const totalExpected = payments.reduce((s,p)=>s+(p.amount||0),0);

  document.getElementById('pg-title').textContent = 'Cashflow';
  document.getElementById('pg-sub').textContent = 'Month-wise breakdown of income';

  document.getElementById('pg-content').innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-label">Total Expected</div>
        <div class="stat-value">&#8377;${Math.round(totalExpected/1000)}k</div>
        <div class="stat-meta">Across all months</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Received So Far</div>
        <div class="stat-value">&#8377;${Math.round(payments.filter(p=>p.status==='received').reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div>
        <div class="stat-meta">${payments.filter(p=>p.status==='received').length} payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Still Incoming</div>
        <div class="stat-value">&#8377;${Math.round(payments.filter(p=>p.status==='pending').reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div>
        <div class="stat-meta">${payments.filter(p=>p.status==='pending').length} pending</div>
      </div>
    </div>
    ${sortedKeys.map(k => {
      const m = months[k];
      const receivedTotal = m.received.reduce((s,p)=>s+(p.amount||0),0);
      const pendingTotal = m.pending.reduce((s,p)=>s+(p.amount||0),0);
      const monthTotal = receivedTotal + pendingTotal;
      const pct = monthTotal > 0 ? Math.round((receivedTotal/monthTotal)*100) : 0;
      const isPast = new Date(k+'-28') < new Date();
      return `
      <div class="cashflow-month">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="cashflow-month-title">${m.label}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">&#8377;${Number(monthTotal).toLocaleString()}</div>
        </div>
        <div class="cashflow-bar"><div class="cashflow-bar-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div class="meta" style="color:var(--green-light)">&#10003; &#8377;${Number(receivedTotal).toLocaleString()} received</div>
          <div class="meta" style="${pendingTotal>0?'color:var(--gold)':'color:var(--gray)'}">&#8377;${Number(pendingTotal).toLocaleString()} ${isPast&&pendingTotal>0?'overdue':'expected'}</div>
        </div>
        ${m.received.length+m.pending.length > 0 ? `
        <div style="margin-top:10px;border-top:1px solid #1a1a1a;padding-top:10px">
          ${[...m.received,...m.pending].map(p=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #141414">
            <div style="font-size:13px">${p.clients?p.clients.name:'Past client'} <span class="meta">· ${p.notes||''}</span></div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:13px">&#8377;${Number(p.amount||0).toLocaleString()}</span>
              <span class="badge badge-${p.status==='received'?'paid':'pending'}">${p.status}</span>
              ${p.status==='pending'?`<button class="btn btn-primary btn-sm" onclick="markPaid('${p.id}')">Mark Received</button>`:''}
            </div>
          </div>`).join('')}
        </div>` : ''}
      </div>`;
    }).join('')}
  `;
}

// =====================
// CONTRACT RENEWAL ALERTS
// =====================
function checkRenewals(clients) {
  const now = new Date();
  const in30 = new Date(now.getTime() + 30 * 86400000);
  return (clients||[]).filter(c => {
    if(!c.contract_end) return false;
    const end = new Date(c.contract_end);
    return end >= now && end <= in30;
  });
}

</script>

.badge-pending{background:rgba(184,148,46,0.15);color:var(--gold);border:1px solid rgba(184,148,46,0.3);}
.badge-draft{background:rgba(107,107,107,0.15);color:var(--gray);border:1px solid rgba(107,107,107,0.3);}
.badge-approved{background:rgba(26,122,74,0.15);color:var(--green-light);border:1px solid rgba(26,122,74,0.3);}
.badge-published{background:rgba(58,111,216,0.15);color:#7ea4f4;border:1px solid rgba(58,111,216,0.3);}
.badge-posted{background:rgba(26,122,74,0.25);color:#4dab7a;border:1px solid rgba(26,122,74,0.5);}
.badge-edited{background:rgba(184,148,46,0.15);color:var(--gold);border:1px solid rgba(184,148,46,0.3);}
.badge-comment{background:rgba(58,111,216,0.15);color:#7ea4f4;border:1px solid rgba(58,111,216,0.3);}

/* BUTTONS */
.btn{padding:9px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;-webkit-appearance:none;border-radius:0;}
.btn-primary{background:var(--gold);color:var(--black);}
.btn-primary:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid #2a2a2a;color:var(--gray);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:6px 11px;font-size:10px;}
.btn-danger{background:transparent;border:1px solid rgba(192,57,43,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(192,57,43,0.1);}
.btn-green{background:var(--green);color:white;}
.btn-approve{background:rgba(26,122,74,0.2);border:1px solid rgba(26,122,74,0.4);color:var(--green-light);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 16px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none;border-radius:0;}
.btn-approve:hover{background:rgba(26,122,74,0.35);}
.btn-approve.approved{background:rgba(26,122,74,0.25);color:#4dab7a;cursor:default;}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}
.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;color:var(--cream);padding:10px 11px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;-webkit-appearance:none;border-radius:0;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:#111;}
.field textarea{resize:vertical;min-height:100px;line-height:1.6;}
.field-note{font-size:11px;color:var(--gray);margin-top:4px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.active{display:flex;}
.modal{background:#111;border:1px solid #2a2a2a;width:100%;max-width:620px;margin:auto;}
.modal-header{padding:20px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;}
.modal-close{background:none;border:none;color:var(--gray);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid #1a1a1a;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}

/* DRAFT CARDS */
.draft-card{background:#0d0d0d;border:1px solid #1a1a1a;padding:18px;margin-bottom:14px;transition:border-color 0.15s;}
.draft-card.has-edit{border-color:rgba(184,148,46,0.4);}
.draft-card.has-comment{border-color:rgba(58,111,216,0.4);}
.draft-card.client-approved{border-color:rgba(26,122,74,0.4);}
.draft-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;}
.draft-meta{font-size:11px;color:var(--gray);margin-top:3px;}
.draft-content{font-size:13px;color:var(--gray);line-height:1.7;white-space:pre-wrap;background:#0a0a0a;padding:13px;border:1px solid #1a1a1a;margin-bottom:12px;}

/* THREAD */
.thread-wrap{margin-top:14px;border:1px solid #1a1a1a;background:#0a0a0a;}
.thread-header{padding:10px 14px;border-bottom:1px solid #1a1a1a;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);}
.thread-messages{padding:12px 14px;max-height:220px;overflow-y:auto;}
.thread-msg{margin-bottom:12px;}
.thread-msg:last-child{margin-bottom:0;}
.thread-msg-meta{font-size:10px;color:var(--gray);margin-bottom:3px;}
.thread-msg-meta .sender-you{color:var(--gold);}
.thread-msg-meta .sender-client{color:var(--green-light);}
.thread-msg-text{font-size:13px;color:var(--cream);line-height:1.6;background:#111;padding:9px 12px;border-left:2px solid #2a2a2a;}
.thread-msg.msg-you .thread-msg-text{border-left-color:var(--gold);}
.thread-msg.msg-client .thread-msg-text{border-left-color:var(--green-light);}
.thread-reply{padding:10px 14px;border-top:1px solid #1a1a1a;display:flex;gap:8px;}
.thread-reply textarea{flex:1;background:#111;border:1px solid #2a2a2a;color:var(--cream);padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;height:38px;line-height:1.4;-webkit-appearance:none;border-radius:0;}
.thread-reply textarea:focus{border-color:var(--gold);}

/* TOGGLE */
.toggle-group{display:flex;margin-bottom:12px;flex-wrap:wrap;gap:0;}
.toggle-btn{padding:7px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid #2a2a2a;background:transparent;color:var(--gray);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.toggle-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}

/* NOTICES */
.edit-notice{background:rgba(184,148,46,0.08);border:1px solid rgba(184,148,46,0.25);padding:9px 13px;font-size:12px;color:var(--gold);margin-bottom:10px;}
.approved-notice{background:rgba(26,122,74,0.08);border:1px solid rgba(26,122,74,0.25);padding:9px 13px;font-size:12px;color:var(--green-light);margin-bottom:10px;}
.admin-note-box{background:rgba(107,107,107,0.06);border:1px solid #1e1e1e;padding:11px 13px;margin-top:10px;}

/* CASHFLOW */
.cashflow-table{width:100%;border-collapse:collapse;}
.cashflow-table th{text-align:left;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);padding:10px 13px;border-bottom:1px solid #1a1a1a;background:#0d0d0d;font-weight:400;}
.cashflow-table td{padding:11px 13px;font-size:13px;border-bottom:1px solid #141414;vertical-align:top;}
.cashflow-table tr:last-child td{border-bottom:none;}
.cashflow-month{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--cream);}
.cashflow-clients{font-size:11px;color:var(--gray);margin-top:3px;line-height:1.6;}
.cashflow-total{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);}
.cashflow-received{font-size:12px;color:var(--green-light);}
.cashflow-pending{font-size:12px;color:var(--gold);}

/* RENEWAL ALERT */
.renewal-alert{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.renewal-alert-text{font-size:13px;color:var(--red);}
.renewal-alert-text strong{color:var(--cream);}

/* ACTIVITY LOG */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #141414;}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0;}
.activity-text{font-size:13px;color:var(--cream);line-height:1.5;}
.activity-time{font-size:11px;color:var(--gray);margin-top:2px;}

/* CLIENT PORTAL */
.portal-hero{background:#111;border:1px solid #1a1a1a;padding:28px;margin-bottom:18px;position:relative;overflow:hidden;}
.portal-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.portal-greeting{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;}
.portal-sub{font-size:13px;color:var(--gray);margin-top:4px;}

/* CONTRACT PROGRESS */
.contract-progress{background:#111;border:1px solid #1a1a1a;padding:20px;margin-bottom:18px;}
.progress-months{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.progress-month{flex:1;min-width:60px;background:#0d0d0d;border:1px solid #1a1a1a;padding:8px;text-align:center;font-size:11px;color:var(--gray);}
.progress-month.done{background:rgba(184,148,46,0.1);border-color:var(--gold);color:var(--gold);}
.progress-month.current{background:rgba(184,148,46,0.2);border-color:var(--gold-light);color:var(--gold-light);}

/* MISC */
.divider{border:none;border-top:1px solid #1a1a1a;margin:16px 0;}
.empty-state{text-align:center;padding:44px 26px;color:var(--gray);}
.loading{text-align:center;padding:36px;color:var(--gray);font-size:13px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #2a2a2a;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast-container{position:fixed;bottom:80px;right:16px;z-index:9999;}
.toast{background:#1a1a1a;border:1px solid #2a2a2a;border-left:3px solid var(--gold);padding:12px 15px;margin-top:8px;font-size:13px;color:var(--cream);max-width:280px;animation:slideIn 0.3s ease;}
.toast.error{border-left-color:var(--red);}
.toast.success{border-left-color:var(--green);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#2a2a2a;}

/* CASHFLOW TABLE */
.cashflow-table{width:100%;border-collapse:collapse;}
.cashflow-table th{text-align:left;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);padding:12px 16px;border-bottom:1px solid #1a1a1a;background:#0d0d0d;font-weight:400;}
.cashflow-table td{padding:14px 16px;border-bottom:1px solid #141414;vertical-align:middle;}
.cashflow-table tr:last-child td{border-bottom:none;}
.cashflow-table tr:hover td{background:#141414;}
.cashflow-month{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--cream);}
.cashflow-clients{font-size:12px;color:var(--gray);line-height:1.6;}
.cashflow-received{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--green-light);}
.cashflow-pending{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);}
.cashflow-total{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);font-weight:500;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px;}
.search-input{width:100%;background:#111;border:1px solid #2a2a2a;border-bottom:2px solid var(--gold);color:var(--cream);padding:16px 20px;font-family:'Cormorant Garamond',serif;font-size:22px;outline:none;letter-spacing:1px;}
.search-input::placeholder{color:#333;}
.search-input:focus{border-color:var(--gold);background:#141414;}
.search-results{display:flex;flex-direction:column;gap:8px;}
.search-result-item{background:#111;border:1px solid #1a1a1a;padding:16px 20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:16px;}
.search-result-item:hover{border-color:var(--gold);background:#141414;}
.search-result-type{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);background:#1a1a1a;padding:3px 8px;white-space:nowrap;}
.search-result-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--cream);}
.search-result-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.action-btns{display:flex;gap:6px;flex-wrap:wrap;}
.gold{color:var(--gold);}
.meta{font-size:12px;color:var(--gray);}
.warn-box{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7;}
.warn-box strong{color:var(--red);}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:8px;display:block;}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none;}
  .mobile-header{display:flex;}
  .mobile-nav{display:block;}
  .main-content{margin-left:0;padding-top:56px;padding-bottom:70px;}
  .top-bar{padding:14px 16px;}
  .page-title{font-size:22px;}

  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;}

  .panel-body{padding:14px;}
  .panel-title{font-size:16px;}
  .action-btns{gap:4px;}
  .btn{padding:8px 12px;font-size:10px;}
  .btn-sm{padding:5px 9px;font-size:9px;}
  .top-bar{display:none;}

}

  .stats-grid{grid-template-columns:1fr;}
  .login-card{padding:36px 24px;}

}

<script>
const SUPABASE_URL='https://rrxpbmzszdwqhoqfhsqf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyeHBibXpzemR3cWhvcWZoc3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDAwMzMsImV4cCI6MjA5MTU3NjAzM30.MPbP-59X2hOALFDVG5cmoH3KGcDjk1VirgYKS_JIc4M';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
let CU=null,CP=null;

setTimeout(()=>{const c=document.getElementById('curtain');if(c)c.remove();},4400);

function startClock(){
  function tick(){
    const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const de=document.getElementById('clock-date'),te=document.getElementById('clock-time');
    if(de)de.textContent=days[ist.getDay()]+', '+String(ist.getDate()).padStart(2,'0')+' '+months[ist.getMonth()]+' '+ist.getFullYear();
    if(te)te.textContent=String(ist.getHours()).padStart(2,'0')+':'+String(ist.getMinutes()).padStart(2,'0')+':'+String(ist.getSeconds()).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
}
startClock();

function localDate(){
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

document.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('fr_user');
  if(s){CU=JSON.parse(s);showApp();}
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

// AUTH
async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  if(!u||!p){document.getElementById('lerr').textContent='Enter username and password.';return;}
  const{data,error}=await db.from('users').select('*').eq('username',u).eq('password',p).limit(1);
  if(error||!data||data.length===0){document.getElementById('lerr').textContent='Invalid username or password.';return;}
  const user=data[0];
  CU={username:user.username,role:user.role,name:user.name,clientId:user.client_id};
  sessionStorage.setItem('fr_user',JSON.stringify(CU));
  document.getElementById('lerr').textContent='';
  showApp();
}

function doLogout(){
  sessionStorage.removeItem('fr_user');CU=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-name').textContent=CU.name;
  const mhn=document.getElementById('mob-hi-name');
  if(mhn) mhn.textContent=CU.name;
  buildNav();
  buildMobileNav();
  go(CU.role==='admin'?'dashboard':'client-home');
}

// NAV
function buildNav(){
  const nav=document.getElementById('sb-nav');
  const mbnav=document.getElementById('mb-nav');
  if(CU.role==='admin'){
    nav.innerHTML=`

// ADMIN DASHBOARD
async function renderAdminDash(){
  const[{data:cl},{data:pm},{data:po}]=await Promise.all([
    db.from('clients').select('*'),
    db.from('payments').select('*'),
    db.from('posts').select('*')
  ]);
  const clients=cl||[],payments=pm||[],posts=po||[];
  const received=payments.filter(p=>p.status==='received');
  const pending=payments.filter(p=>p.status==='pending');
  const{data:allRec}=await db.from('payments').select('amount').eq('status','received');
  const totalRev=(allRec||[]).reduce((s,p)=>s+(p.amount||0),0);
  const notifPosts=posts.filter(p=>p.client_edited||p.comment_unread||p.client_approved);

  // Renewal alerts — contracts ending within 30 days
  const now=new Date();
  const expiring=clients.filter(c=>{
    if(!c.contract_end)return false;
    const end=new Date(c.contract_end);
    const days=Math.ceil((end-now)/86400000);
    return days>=0&&days<=30;
  });

  let renewalHtml='';
  if(expiring.length>0){
    renewalHtml=expiring.map(c=>{
      const days=Math.ceil((new Date(c.contract_end)-now)/86400000);
      return`<div class="renewal-alert"><div class="renewal-alert-text"><strong>${c.name}</strong>'s contract expires in <strong style="color:var(--red)">${days} day${days!==1?'s':''}</strong> on ${fmtDate(c.contract_end)}. Time to start the renewal conversation.</div><button class="btn btn-outline btn-sm" onclick="go('clients')">View Client</button></div>`;
    }).join('');
  }

  document.getElementById('pg-content').innerHTML=`
    ${renewalHtml}
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Active Clients</div><div class="stat-value">${clients.length}</div><div class="stat-meta">Engagements running</div></div>
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value">&#8377;${Math.round(totalRev/1000)}k</div><div class="stat-meta">${received.length} payments cleared</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value">&#8377;${Math.round(pending.reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div><div class="stat-meta">${pending.length} awaiting</div></div>
      <div class="stat-card"><div class="stat-label">Notifications</div><div class="stat-value" style="${notifPosts.length>0?'color:var(--gold)':''}">${notifPosts.length}</div><div class="stat-meta">From clients</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Upcoming Payments</div><button class="btn btn-outline btn-sm" onclick="go('payments')">View All</button></div>
      <div class="panel-body" style="padding:0">
        ${pending.length===0?'<div class="empty-state"><p>No pending payments.</p></div>':'<table class="data-table"><thead><tr><th>Client</th><th>Amount</th><th>Due</th><th>Action</th></tr></thead><tbody>'+
        pending.slice(0,5).map(p=>{const c=clients.find(x=>x.id===p.client_id);return`<tr><td>${c?c.name:'—'}</td><td class="gold">&#8377;${Number(p.amount||0).toLocaleString()}</td><td>${fmtDate(p.due_date)}</td><td><button class="btn btn-primary btn-sm" onclick="markPaid('${p.id}')">Mark Received</button></td></tr>`;}).join('')+'</tbody></table>'}
      </div>
    </div>
    ${notifPosts.length>0?`
    <div class="panel">
      <div class="panel-header"><div class="panel-title" style="color:var(--gold)">Client Activity</div><button class="btn btn-outline btn-sm" onclick="go('drafts')">Go to Drafts</button></div>
      <div class="panel-body" style="padding:0">
        <table class="data-table"><thead><tr><th>Client</th><th>Post</th><th>Activity</th><th>When</th></tr></thead><tbody>
          ${notifPosts.map(p=>{const c=clients.find(x=>x.id===p.client_id);const act=p.client_approved?'Approved':p.client_edited?'Edited':'Comment';return`<tr><td>${c?c.name:'—'}</td><td>${p.title||'Untitled'}</td><td><span class="badge badge-${p.client_approved?'client-approved':p.client_edited?'edited':'comment'}">${act}</span></td><td class="meta">${fmtDateTime(p.approved_at||p.edited_at||p.comment_at)}</td></tr>`;}).join('')}
        </tbody></table>
      </div>
    </div>`:''}
  `;
}

function renderSearch(){
  document.getElementById('pg-content').innerHTML=`
    <div class="search-wrap">
      <input class="search-input" id="search-input" placeholder="Search clients, drafts, payments..." oninput="doSearch(this.value)" autofocus/>

let searchTimer=null;
async function doSearch(q){
  clearTimeout(searchTimer);
  if(q.trim().length<2){document.getElementById('search-results').innerHTML='<div class="meta" style="text-align:center;padding:20px">Type at least 2 characters...</div>';return;}
  searchTimer=setTimeout(async()=>{
    const[{data:cl},{data:po},{data:pm}]=await Promise.all([
      db.from('clients').select('*').ilike('name','%'+q+'%'),
      db.from('posts').select('*,clients(name)').or('title.ilike.%'+q+'%,content.ilike.%'+q+'%'),
      db.from('payments').select('*,clients(name)').ilike('notes','%'+q+'%')
    ]);
    const results=[];
    (cl||[]).forEach(c=>results.push({type:'Client',title:c.name,sub:c.company||'',action:()=>go('clients')}));
    (po||[]).forEach(p=>results.push({type:'Draft',title:p.title||'Untitled',sub:(p.clients?p.clients.name:'')+(p.month_year?' · '+p.month_year:''),action:()=>go('drafts')}));
    (pm||[]).forEach(p=>results.push({type:'Payment',title:'&#8377;'+Number(p.amount||0).toLocaleString()+' — '+(p.clients?p.clients.name:''),sub:p.notes||'',action:()=>go('payments')}));
    const el=document.getElementById('search-results');
    if(!results.length){el.innerHTML='<div class="meta" style="text-align:center;padding:20px">No results found.</div>';return;}
    el.innerHTML=results.map((r,i)=>`
      <div class="search-result-item" onclick="searchResults[${i}].action()">
        <div class="search-result-type">${r.type}</div>
        <div>
          <div class="search-result-title">${r.title}</div>
          <div class="search-result-sub">${r.sub}</div>
        </div>
      </div>`).join('');
    window.searchResults=results;
  },300);
}

// CASHFLOW
async function renderCashflow(){
  const{data:pm}=await db.from('payments').select('*,clients(name)').order('due_date');
  const payments=pm||[];
  const monthMap={};
  payments.forEach(p=>{
    const d=new Date(p.due_date||p.created_at);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear();
    if(!monthMap[key])monthMap[key]={label,received:0,pending:0,clients:[]};
    if(p.status==='received')monthMap[key].received+=p.amount||0;
    else monthMap[key].pending+=p.amount||0;
    const name=p.clients?p.clients.name:'Unknown';
    if(!monthMap[key].clients.includes(name))monthMap[key].clients.push(name);
  });
  const months=Object.keys(monthMap).sort();
  const now=new Date();
  const currentKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const{data:allRec}=await db.from('payments').select('amount').eq('status','received');
  const totalRev=(allRec||[]).reduce((s,p)=>s+(p.amount||0),0);

  document.getElementById('pg-content').innerHTML=`
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">All-Time Revenue</div><div class="stat-value">&#8377;${Math.round(totalRev/1000)}k</div><div class="stat-meta">Total received</div></div>
      <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value">&#8377;${Math.round((monthMap[currentKey]?.received||0)/1000)}k</div><div class="stat-meta">Received in ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]}</div></div>
      <div class="stat-card"><div class="stat-label">Next 30 Days</div><div class="stat-value">&#8377;${Math.round(payments.filter(p=>{const d=new Date(p.due_date);return p.status==='pending'&&d>=now&&(d-now)/86400000<=30;}).reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div><div class="stat-meta">Expected incoming</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Month-wise Cashflow</div></div>
      <div class="panel-body" style="padding:0">
        <table class="cashflow-table">
          <thead><tr><th>Month</th><th>Clients</th><th>Received</th><th>Pending</th><th>Total</th></tr></thead>
          <tbody>
            ${months.map(key=>{
              const m=monthMap[key];
              const isCurrent=key===currentKey;
              const isFuture=key>currentKey;
              return`<tr style="${isCurrent?'background:rgba(184,148,46,0.05)':''}">
                <td><div class="cashflow-month">${m.label} ${isCurrent?'<span class="badge badge-edited" style="font-size:9px">Now</span>':''}</div></td>
                <td><div class="cashflow-clients">${m.clients.join('<br>')}</div></td>
                <td>${m.received>0?'<div class="cashflow-received">&#8377;'+Number(m.received).toLocaleString()+'</div>':'<div class="meta">—</div>'}</td>
                <td>${m.pending>0?'<div class="cashflow-pending">&#8377;'+Number(m.pending).toLocaleString()+'</div>':'<div class="meta">—</div>'}</td>
                <td><div class="cashflow-total">&#8377;${Number(m.received+m.pending).toLocaleString()}</div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// CLIENTS
async function renderClients(){
  document.getElementById('pg-actions').innerHTML='<button class="btn btn-primary" onclick="go(\'add-client\')">+ Add Client</button>';
  const{data:cl}=await db.from('clients').select('*').order('created_at',{ascending:false});
  const{data:pm}=await db.from('payments').select('*');
  const{data:po}=await db.from('posts').select('*');
  const clients=cl||[],payments=pm||[],posts=po||[];
  if(!clients.length){document.getElementById('pg-content').innerHTML='<div class="empty-state"><p>No clients yet.</p></div>';return;}

  document.getElementById('pg-content').innerHTML=clients.map(c=>{
    const cpm=payments.filter(p=>p.client_id===c.id);
    const cpo=posts.filter(p=>p.client_id===c.id);
    const paid=cpm.filter(p=>p.status==='received');
    const pend=cpm.filter(p=>p.status==='pending');
    const notifPosts=cpo.filter(p=>p.client_edited||p.comment_unread||p.client_approved);
    const now=new Date();
    const start=c.contract_start?new Date(c.contract_start):now;
    const end=c.contract_end?new Date(c.contract_end):now;
    const prog=Math.round((Math.min(Math.max(0,(now-start)/86400000),(end-start)/86400000)/Math.max(1,(end-start)/86400000))*100);
    const daysLeft=Math.max(0,Math.ceil((end-now)/86400000));
    const expiringSoon=daysLeft<=30;

    // Activity log for client
    const activities=[];
    cpo.forEach(p=>{
      if(p.client_approved)activities.push({text:`Approved "${p.title||'Untitled'}"`,time:p.approved_at});
      if(p.client_edited)activities.push({text:`Edited "${p.title||'Untitled'}"`,time:p.edited_at});
      if(p.comment_unread)activities.push({text:`Commented on "${p.title||'Untitled'}"`,time:p.comment_at});
    });
    activities.sort((a,b)=>new Date(b.time)-new Date(a.time));

    return`
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">${c.name} ${notifPosts.length>0?'<span class="badge badge-edited" style="font-size:10px;margin-left:6px">'+notifPosts.length+' new</span>':''} ${expiringSoon?'<span class="badge badge-pending" style="font-size:10px;margin-left:6px">Expires in '+daysLeft+'d</span>':''}</div>
          <div class="meta">${c.company||''} ${c.email?'· '+c.email:''}</div>
        </div>
        <div class="action-btns">
          <button class="btn btn-outline btn-sm" onclick="openEditClient('${c.id}')">Edit</button>
          <button class="btn btn-outline btn-sm" onclick="openAddPayment('${c.id}','${escAttr(c.name)}')">+ Payment</button>
          <button class="btn btn-primary btn-sm" onclick="openAddDraft('${c.id}','${escAttr(c.name)}')">+ Draft</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDeleteClient('${c.id}','${escAttr(c.name)}')">Delete</button>
        </div>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:18px">
          <div><div class="stat-label">Package</div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">&#8377;${Number(c.package_amount||0).toLocaleString()}<span style="font-size:12px;color:var(--gray)">/mo</span></div><div class="meta">${c.package_name||''}</div></div>
          <div><div class="stat-label">Contract</div><div style="font-size:13px">${fmtDate(c.contract_start)} → ${fmtDate(c.contract_end)}</div><div style="background:#1a1a1a;height:3px;margin-top:5px"><div style="background:var(--gold);height:3px;width:${prog}%"></div></div><div class="meta" style="margin-top:3px">${prog}% elapsed</div></div>
          <div><div class="stat-label">Payments</div><div style="font-size:13px;color:var(--green-light)">&#10003; ${paid.length} received</div><div style="font-size:13px;color:var(--gold)">${pend.length} pending</div></div>
          <div><div class="stat-label">Deliverables</div><div style="font-size:12px;color:var(--gray);line-height:1.7">${c.notes||'—'}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <span class="section-label">Payment Schedule</span>
            ${cpm.length===0?'<div class="meta">No payments added.</div>':`
            <table class="data-table" style="background:#0a0a0a">
              <thead><tr><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead>
              <tbody>${cpm.map(p=>`<tr><td>&#8377;${Number(p.amount||0).toLocaleString()}</td><td>${fmtDate(p.due_date)}</td><td><span class="badge badge-${p.status==='received'?'paid':'pending'}">${p.status}</span></td><td>${p.status==='pending'?`<button class="btn btn-primary btn-sm" onclick="markPaid('${p.id}')">&#10003;</button>`:`<button class="btn btn-outline btn-sm" onclick="markUnpaid('${p.id}')">Undo</button>`}</td></tr>`).join('')}</tbody>
            </table>`}
          </div>
          <div>
            <span class="section-label">Activity Log</span>
            ${activities.length===0?'<div class="meta">No activity yet.</div>':activities.slice(0,4).map(a=>`<div class="activity-item"><div class="activity-dot"></div><div><div class="activity-text">${a.text}</div><div class="activity-time">${fmtDateTime(a.time)}</div></div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function markPaid(id){
  const{error}=await db.from('payments').update({status:'received',received_date:localDate()}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Payment marked received!','success');go(CP);
}
async function markUnpaid(id){
  const{error}=await db.from('payments').update({status:'pending',received_date:null}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Payment reset to pending.','success');go(CP);
}

async function renderDrafts(){
  document.getElementById('pg-actions').innerHTML='<button class="btn btn-primary" onclick="openAddDraftAdmin()">+ New Draft</button>';
  const{data:po}=await db.from('posts').select('*,clients(name)').order('created_at',{ascending:false});
  const posts=po||[];
  // Auto-clear comment_unread
  const unread=posts.filter(p=>p.comment_unread).map(p=>p.id);
  if(unread.length>0){await db.from('posts').update({comment_unread:false}).in('id',unread);refreshNotifBadge();}
  if(!posts.length){document.getElementById('pg-content').innerHTML='<div class="empty-state"><p>No drafts yet.</p></div>';return;}
  const months=[...new Set(posts.map(p=>p.month_year).filter(Boolean))];
  const filterHtml=months.length>0?`<div style="margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="meta">Filter:</span><button class="toggle-btn active" id="filter-all" onclick="filterDrafts('all')">All</button>${months.map(m=>`<button class="toggle-btn" id="filter-${m.replace(/\s/g,'-')}" onclick="filterDrafts('${m}')">${m}</button>`).join('')}</div>`:'';
  document.getElementById('pg-content').innerHTML=filterHtml+posts.map(p=>adminDraftCard(p)).join('');
}

function filterDrafts(month){
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(month==='all'?'filter-all':'filter-'+month.replace(/\s/g,'-'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.draft-card').forEach(card=>{card.style.display=(month==='all'||card.dataset.month===month)?'block':'none';});
}

function adminDraftCard(p){
  const hasEdit=p.client_edited&&p.client_content;
  const isApproved=p.client_approved;
  return`
  <div class="draft-card ${hasEdit?'has-edit':''} ${isApproved?'client-approved':''}" data-month="${p.month_year||''}" data-id="${p.id}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div>
        <div class="draft-title">${p.title||'Untitled'}</div>
        <div class="draft-meta">${p.clients?p.clients.name:'—'} ${p.proposed_date?'· Proposed: '+fmtDate(p.proposed_date):''} ${p.month_year?'· '+p.month_year:''}</div>
      </div>
      <div class="action-btns">
        <button class="btn btn-outline btn-sm" onclick="openEditDraft('${p.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDraft('${p.id}')">Delete</button>
        ${p.status==='draft'?`<button class="btn btn-green btn-sm" onclick="updateDraftStatus('${p.id}','approved')">Approve</button>`:''}
        ${p.status==='approved'?`<button class="btn btn-green btn-sm" onclick="updateDraftStatus('${p.id}','posted')">Mark Posted</button>`:''}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge badge-${p.status}">${p.status}</span>
      ${isApproved?'<span class="badge badge-client-approved">Client Approved</span>':''}
      ${hasEdit?'<span class="badge badge-edited">Client Edited</span>':''}
    </div>
    ${isApproved?`<div class="approved-notice">Client approved this draft on ${fmtDateTime(p.approved_at)}</div>`:''}
    ${hasEdit?`<div class="edit-notice">Client edited this draft on ${fmtDateTime(p.edited_at)}</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="tog-yours-${p.id}" onclick="toggleDiff('${p.id}','yours')">Your Version</button>
      <button class="toggle-btn" id="tog-theirs-${p.id}" onclick="toggleDiff('${p.id}','theirs')">Client Version</button>
    </div>
    <div id="diff-yours-${p.id}" class="draft-content">${escHtml(p.original_content||p.content||'')}</div>
    <div id="diff-theirs-${p.id}" class="draft-content" style="display:none;border-color:rgba(26,122,74,0.3)">${escHtml(p.client_content||'')}</div>`
    :`<div class="draft-content">${escHtml(p.content||'')}</div>`}

    <div class="thread-wrap" id="thread-${p.id}"><div class="thread-header">Thread</div><div class="loading" style="padding:14px;font-size:12px"><span class="spinner"></span>Loading...</div></div>
  </div>`;
}

// Load threads after render
async function loadAllThreads(postIds){
  for(const id of postIds){
    await loadThread(id,'admin');
  }
}

async function loadThread(postId, viewerRole){
  const el=document.getElementById('thread-'+postId);
  if(!el)return;
  const{data:msgs}=await db.from('threads').select('*').eq('post_id',postId).order('created_at',{ascending:true});
  const messages=msgs||[];
  const isAdmin=viewerRole==='admin';
  el.innerHTML=`
    <div class="thread-header">Thread ${messages.length>0?'('+messages.length+')':''}</div>
    <div class="thread-messages" id="tm-${postId}">
      ${messages.length===0?'<div class="meta" style="text-align:center;padding:10px">No messages yet.</div>':messages.map(m=>{
        const isYou=(isAdmin&&m.sender==='admin')||(!isAdmin&&m.sender==='client');
        return`<div class="thread-msg ${isYou?'msg-you':'msg-client'}">
          <div class="thread-msg-meta"><span class="${isYou?'sender-you':'sender-client'}">${isYou?'You':m.sender_name}</span> · ${fmtDateTime(m.created_at)}</div>
          <div class="thread-msg-text">${escHtml(m.message)}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="thread-reply">
      <textarea id="tr-${postId}" placeholder="Write a message..." rows="1" onkeydown="handleThreadKey(event,'${postId}','${viewerRole}')"></textarea>
      <button class="btn btn-primary btn-sm" onclick="sendThreadMsg('${postId}','${viewerRole}')">Send</button>
    </div>
  `;
  // Scroll to bottom
  const tm=document.getElementById('tm-'+postId);
  if(tm)tm.scrollTop=tm.scrollHeight;
}

function handleThreadKey(e,postId,role){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendThreadMsg(postId,role);}
}

async function sendThreadMsg(postId,role){
  const el=document.getElementById('tr-'+postId);
  const msg=(el.value||'').trim();
  if(!msg)return;
  el.value='';
  const{error}=await db.from('threads').insert([{
    post_id:postId,
    sender:role,
    sender_name:CU.name,
    message:msg
  }]);
  if(error){toast('Error sending message.','error');return;}
  // If client sent, mark comment_unread for admin
  if(role==='client'){
    await db.from('posts').update({comment_unread:true,comment_at:new Date().toISOString()}).eq('id',postId);
  }
  await loadThread(postId,role);
}

function toggleDiff(id,which){
  document.getElementById(`diff-yours-${id}`).style.display=which==='yours'?'block':'none';
  document.getElementById(`diff-theirs-${id}`).style.display=which==='theirs'?'block':'none';
  document.getElementById(`tog-yours-${id}`).classList.toggle('active',which==='yours');
  document.getElementById(`tog-theirs-${id}`).classList.toggle('active',which==='theirs');
}

async function submitAddClient(){
  const name=document.getElementById('ac-name').value.trim();
  const username=document.getElementById('ac-user').value.trim().toLowerCase();
  const password=document.getElementById('ac-pw').value.trim();
  if(!name){toast('Client name required.','error');return;}
  if(!username||!password){toast('Username and password required.','error');return;}
  const{data:ex}=await db.from('users').select('id').eq('username',username).limit(1);
  if(ex&&ex.length>0){toast('Username already taken.','error');return;}
  const{data:cd,error:ce}=await db.from('clients').insert([{
    name,company:document.getElementById('ac-company').value.trim(),
    email:document.getElementById('ac-email').value.trim(),username,
    package_name:document.getElementById('ac-pkg').value.trim(),
    package_amount:parseFloat(document.getElementById('ac-amt').value)||0,
    posts_per_month:parseInt(document.getElementById('ac-posts').value)||10,
    contract_start:document.getElementById('ac-start').value||null,
    contract_end:document.getElementById('ac-end').value||null,
    notes:document.getElementById('ac-notes').value.trim()
  }]).select();
  if(ce){toast('Error: '+ce.message,'error');return;}
  const{error:ue}=await db.from('users').insert([{username,password,name,role:'client',client_id:cd[0].id}]);
  if(ue){toast('Client created but login failed: '+ue.message,'error');return;}
  toast(name+' added!','success');go('clients');
}

async function submitEditClient(clientId,userId){
  const{error:ce}=await db.from('clients').update({

    company:document.getElementById('ec-company').value.trim(),
    email:document.getElementById('ec-email').value.trim(),
    package_name:document.getElementById('ec-pkg').value.trim(),
    package_amount:parseFloat(document.getElementById('ec-amt').value)||0,
    posts_per_month:parseInt(document.getElementById('ec-posts').value)||10,
    contract_start:document.getElementById('ec-start').value||null,
    contract_end:document.getElementById('ec-end').value||null,
    notes:document.getElementById('ec-notes').value.trim()
  }).eq('id',clientId);
  if(ce){toast('Error: '+ce.message,'error');return;}
  const nu=document.getElementById('ec-user').value.trim().toLowerCase();
  const np=document.getElementById('ec-pw').value.trim();
  if(nu&&np){
    if(userId)await db.from('users').update({username:nu,password:np}).eq('id',userId);
    else{const{data:cd}=await db.from('clients').select('name').eq('id',clientId).maybeSingle();await db.from('users').insert([{username:nu,password:np,name:cd?cd.name:'Client',role:'client',client_id:clientId}]);}
  }
  closeModal();toast('Client updated!','success');go('clients');
}

// DELETE CLIENT
async function confirmDeleteClient(clientId,clientName){
  const{data:pm}=await db.from('payments').select('*').eq('client_id',clientId);
  const{data:po}=await db.from('posts').select('id').eq('client_id',clientId);
  const pendingPm=(pm||[]).filter(p=>p.status==='pending');
  const receivedPm=(pm||[]).filter(p=>p.status==='received');
  modal(`
    <div class="modal-header"><div class="modal-title" style="color:var(--red)">Delete Client</div><button class="modal-close" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="warn-box">
        <strong>This cannot be undone.</strong><br><br>
        Deleting <strong style="color:var(--cream)">${escHtml(clientName)}</strong> will:<br><br>
        &bull; Delete ${pendingPm.length} pending payment${pendingPm.length!==1?'s':''}<br>
        &bull; Delete ${(po||[]).length} post draft${(po||[]).length!==1?'s':''}<br>
        &bull; Keep ${receivedPm.length} received payment${receivedPm.length!==1?'s':''} — still counted in your total revenue
      </div>
      <div style="font-size:13px;color:var(--gray);margin-bottom:8px">Type the client name to confirm:</div>
      <input type="text" id="del-confirm" style="width:100%;background:#0a0a0a;border:1px solid #2a2a2a;color:var(--cream);padding:10px 11px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none" placeholder="${escAttr(clientName)}"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="executeDeleteClient('${clientId}','${escAttr(clientName)}')">Delete Client</button>
    </div>
  `);
}

async function executeDeleteClient(clientId,clientName){
  const input=document.getElementById('del-confirm').value.trim();
  if(input!==clientName){toast('Type the client name exactly.','error');return;}
  await db.from('threads').delete().in('post_id',(await db.from('posts').select('id').eq('client_id',clientId)).data?.map(p=>p.id)||[]);
  await db.from('payments').delete().eq('client_id',clientId).eq('status','pending');
  await db.from('payments').update({client_id:null}).eq('client_id',clientId).eq('status','received');
  await db.from('posts').delete().eq('client_id',clientId);
  await db.from('users').delete().eq('client_id',clientId);
  await db.from('clients').delete().eq('id',clientId);
  closeModal();toast(clientName+' deleted. Revenue preserved.','success');go('clients');
}

  const{error}=await db.from('posts').update({
    title:document.getElementById('ed-title').value.trim(),content,original_content:content,
    proposed_date:document.getElementById('ed-proposed').value||null,
    month_year:document.getElementById('ed-month').value.trim(),
    status:document.getElementById('ed-status').value,
    admin_note:document.getElementById('ed-admin-note').value.trim()
  }).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  closeModal();toast('Draft updated!','success');go('drafts');
}

async function updateDraftStatus(id,status){
  const extra=status==='posted'?{posted_date:localDate()}:{};
  await db.from('posts').update({status,...extra}).eq('id',id);
  toast('Marked as '+status+'!','success');go('drafts');
}

async function deleteDraft(id){
  if(!confirm('Delete this draft?'))return;
  await db.from('threads').delete().eq('post_id',id);
  await db.from('posts').delete().eq('id',id);
  closeModal();toast('Draft deleted.','success');go('drafts');
}

// CLIENT PORTAL
async function getMyClient(){
  if(!CU.clientId)return null;
  const{data}=await db.from('clients').select('*').eq('id',CU.clientId).limit(1);
  return(data&&data.length>0)?data[0]:null;
}

async function renderClientHome(){
  const client=await getMyClient();
  if(!client){document.getElementById('pg-content').innerHTML='<div class="portal-hero"><div class="portal-greeting">Welcome, '+CU.name+'.</div><div class="portal-sub">Your portal is being set up.</div></div>';return;}
  const{data:pm}=await db.from('payments').select('*').eq('client_id',client.id).order('due_date');
  const{data:po}=await db.from('posts').select('*').eq('client_id',client.id).in('status',['approved','posted']).order('created_at',{ascending:false});
  const payments=pm||[],posts=po||[];
  const pending=payments.filter(p=>p.status==='pending');
  const next=pending.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))[0];
  const now=new Date();
  const end=client.contract_end?new Date(client.contract_end):now;
  const daysLeft=Math.max(0,Math.ceil((end-now)/86400000));
  const start=client.contract_start?new Date(client.contract_start):now;
  const totalMonths=Math.ceil((end-start)/86400000/30);
  const elapsedMonths=Math.ceil((now-start)/86400000/30);

  // Contract progress months
  const monthsHtml=Array.from({length:totalMonths}).map((_,i)=>{
    const isDone=i<elapsedMonths-1;
    const isCurrent=i===elapsedMonths-1;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const d=new Date(start);d.setMonth(d.getMonth()+i);
    const label=months[d.getMonth()];
    return`<div class="progress-month ${isDone?'done':isCurrent?'current':''}">${label}<br><span style="font-size:9px">${isDone?'Done':isCurrent?'Now':'—'}</span></div>`;
  }).join('');

  document.getElementById('pg-content').innerHTML=`
    <div class="portal-hero">
      <div class="portal-greeting">Welcome back, ${escHtml(client.name)}.</div>
      <div class="portal-sub">${escHtml(client.package_name||'LinkedIn Content Partnership')} · Boldface</div>
    </div>
    <div class="contract-progress">
      <div class="stat-label">Contract Progress</div>
      <div class="progress-months">${monthsHtml}</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Monthly Package</div><div class="stat-value" style="font-size:24px">&#8377;${Number(client.package_amount||0).toLocaleString()}</div><div class="stat-meta">${client.package_name||''}</div></div>
      <div class="stat-card"><div class="stat-label">Next Payment</div><div class="stat-value" style="font-size:20px">${next?'&#8377;'+Number(next.amount||0).toLocaleString():'—'}</div><div class="stat-meta">${next?fmtDate(next.due_date):'No pending payments'}</div></div>
      <div class="stat-card"><div class="stat-label">Posts Available</div><div class="stat-value">${posts.length}</div><div class="stat-meta">Drafts from Boldface</div></div>
      <div class="stat-card"><div class="stat-label">Days Left</div><div class="stat-value">${daysLeft}</div><div class="stat-meta">Contract ends ${fmtDate(client.contract_end)}</div></div>
    </div>
    ${posts.length>0?`<div class="panel"><div class="panel-header"><div class="panel-title">Latest from Boldface</div><button class="btn btn-outline btn-sm" onclick="go('client-drafts')">View All</button></div><div class="panel-body">${posts.slice(0,2).map(p=>`<div class="draft-card" style="margin-bottom:10px"><div class="draft-title">${escHtml(p.title||'LinkedIn Post')}</div><div class="draft-meta">${p.proposed_date?'Proposed: '+fmtDate(p.proposed_date):''}</div><div class="draft-content" style="margin-top:8px;max-height:70px;overflow:hidden">${escHtml((p.client_content||p.content||'').substring(0,180))}...</div></div>`).join('')}</div></div>`:''}
  `;
}

async function openClientEdit(postId){
  const{data:p}=await db.from('posts').select('*').eq('id',postId).maybeSingle();
  if(!p)return;
  modal(`
    <div class="modal-header"><div class="modal-title">Edit Draft</div><button class="modal-close" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px;font-size:13px;color:var(--gray)">Your edits are saved alongside the original. Boldface will see both versions.</div>

    </div>

      <button class="btn btn-primary" onclick="submitClientEdit('${postId}')">Save My Edit</button>

async function submitClientEdit(postId){
  const content=(document.getElementById('ce-content').value||'').trim();
  if(!content){toast('Content cannot be empty.','error');return;}
  const{error}=await db.from('posts').update({client_content:content,client_edited:true,edited_at:new Date().toISOString()}).eq('id',postId);
  if(error){toast('Error saving edit.','error');return;}
  closeModal();toast('Your edit has been saved!','success');go('client-drafts');
}

// UTILS
function modal(html){document.getElementById('modals').innerHTML=`<div class="modal-overlay active" id="mo" onclick="handleMO(event)"><div class="modal">${html}</div></div>`;}
function handleMO(e){if(e.target.id==='mo')closeModal();}
function closeModal(){document.getElementById('modals').innerHTML='';}

function toast(msg,type='default'){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),3500);
}

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function loadThread(postId) {
  const { data } = await db.from('threads').select('*').eq('post_id', postId).order('created_at', {ascending:true});
  return data || [];
}

function renderThread(messages, postId, isAdmin) {
  const isEmpty = messages.length === 0;
  const msgsHtml = isEmpty ? '<div class="thread-empty">No messages yet. Start the conversation.</div>' :
    messages.map(m => {
      const fromAdmin = m.sender === 'admin';
      const cls = fromAdmin ? 'from-admin' : 'from-client';
      const who = fromAdmin ? 'Koushik' : m.sender_name || 'Client';
      return `<div class="thread-msg ${cls}">
        <div class="thread-who">${who}</div>
        <div class="thread-bubble">${escHtml(m.message)}</div>
        <div class="thread-time">${fmtDateTime(m.created_at)}</div>
      </div>`;
    }).join('');

  return `
    <div style="margin-top:14px">
      <div class="section-label">Conversation</div>
      <div class="thread-container" id="thread-${postId}">${msgsHtml}</div>
      <div class="thread-input-row">
        <textarea id="thread-input-${postId}" placeholder="Type a message..." rows="1"></textarea>
        <button class="btn btn-primary btn-sm" onclick="sendThreadMessage('${postId}','${isAdmin?'admin':'client'}')">Send</button>
      </div>
    </div>`;
}

async function sendThreadMessage(postId, senderRole) {
  const input = document.getElementById('thread-input-' + postId);
  const message = (input ? input.value : '').trim();
  if(!message) return;

  const senderName = CU.name;
  const { error } = await db.from('threads').insert([{
    post_id: postId,
    sender: senderRole,
    sender_name: senderName,
    message
  }]);

  if(error) { toast('Error sending message.', 'error'); return; }

  // Mark unread for the other side
  if(senderRole === 'client') {
    await db.from('posts').update({ comment_unread: true, comment_at: new Date().toISOString() }).eq('id', postId);
  } else {
    await db.from('posts').update({ admin_replied: true }).eq('id', postId);
  }

  if(input) input.value = '';
  // Reload thread messages
  const messages = await loadThread(postId);
  const container = document.getElementById('thread-' + postId);
  if(container) {
    container.innerHTML = messages.map(m => {
      const fromAdmin = m.sender === 'admin';
      const cls = fromAdmin ? 'from-admin' : 'from-client';
      const who = fromAdmin ? 'Koushik' : m.sender_name || 'Client';
      return `<div class="thread-msg ${cls}">
        <div class="thread-who">${who}</div>
        <div class="thread-bubble">${escHtml(m.message)}</div>
        <div class="thread-time">${fmtDateTime(m.created_at)}</div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }
}

async function renderSearch() {
  document.getElementById('pg-content').innerHTML = `
    <input type="text" class="search-bar" id="search-input" placeholder="Search clients, drafts, payments..." oninput="doSearch()" autofocus/>
    <div id="search-results"></div>
  `;
}

async function doSearch() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const results = document.getElementById('search-results');
  if(!q || q.length < 2) { results.innerHTML = '<div class="meta" style="text-align:center;padding:20px">Type to search...</div>'; return; }

  const [{ data: cl }, { data: po }, { data: pm }] = await Promise.all([
    db.from('clients').select('*'),
    db.from('posts').select('*, clients(name)'),
    db.from('payments').select('*, clients(name)')
  ]);

  const clients = (cl||[]).filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  );

  const posts = (po||[]).filter(p =>
    (p.title||'').toLowerCase().includes(q) ||
    (p.content||'').toLowerCase().includes(q) ||
    (p.month_year||'').toLowerCase().includes(q)
  );

  const payments = (pm||[]).filter(p =>
    (p.notes||'').toLowerCase().includes(q) ||
    (p.clients&&(p.clients.name||'').toLowerCase().includes(q))
  );

  if(!clients.length && !posts.length && !payments.length) {
    results.innerHTML = '<div class="meta" style="text-align:center;padding:20px">No results found.</div>';
    return;
  }

  let html = '';

  if(clients.length) {
    html += clients.map(c => `
      <div class="search-result" onclick="go('clients')">
        <div class="search-result-type">Client</div>
        <div class="search-result-title">${c.name}</div>
        <div class="search-result-sub">${c.company||''} ${c.package_name?'· '+c.package_name:''}</div>
      </div>`).join('');
  }

  if(posts.length) {
    html += posts.map(p => `
      <div class="search-result" onclick="go('drafts')">
        <div class="search-result-type">Draft · ${p.clients?p.clients.name:'—'}</div>
        <div class="search-result-title">${p.title||'Untitled'}</div>
        <div class="search-result-sub">${(p.content||'').substring(0,80)}...</div>
      </div>`).join('');
  }

  if(payments.length) {
    html += payments.map(p => `
      <div class="search-result" onclick="go('payments')">
        <div class="search-result-type">Payment · ${p.clients?p.clients.name:'—'}</div>
        <div class="search-result-title">&#8377;${Number(p.amount||0).toLocaleString()} · ${fmtDate(p.due_date)}</div>
        <div class="search-result-sub">${p.notes||''} · ${p.status}</div>
      </div>`).join('');
  }

  results.innerHTML = html;
}

async function renderCashflow() {
  const { data: pm } = await db.from('payments').select('*, clients(name)').order('due_date');
  const payments = pm || [];

  // Group by month
  const months = {};
  payments.forEach(p => {
    if(!p.due_date) return;
    const d = new Date(p.due_date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleDateString('en-IN', {month:'long', year:'numeric'});
    if(!months[key]) months[key] = { label, received: [], pending: [], key };
    if(p.status === 'received') months[key].received.push(p);
    else months[key].pending.push(p);
  });

  const sortedKeys = Object.keys(months).sort();
  const totalExpected = payments.reduce((s,p)=>s+(p.amount||0),0);

  document.getElementById('pg-title').textContent = 'Cashflow';
  document.getElementById('pg-sub').textContent = 'Month-wise breakdown of income';

  document.getElementById('pg-content').innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-label">Total Expected</div>
        <div class="stat-value">&#8377;${Math.round(totalExpected/1000)}k</div>
        <div class="stat-meta">Across all months</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Received So Far</div>
        <div class="stat-value">&#8377;${Math.round(payments.filter(p=>p.status==='received').reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div>
        <div class="stat-meta">${payments.filter(p=>p.status==='received').length} payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Still Incoming</div>
        <div class="stat-value">&#8377;${Math.round(payments.filter(p=>p.status==='pending').reduce((s,p)=>s+(p.amount||0),0)/1000)}k</div>
        <div class="stat-meta">${payments.filter(p=>p.status==='pending').length} pending</div>
      </div>
    </div>
    ${sortedKeys.map(k => {
      const m = months[k];
      const receivedTotal = m.received.reduce((s,p)=>s+(p.amount||0),0);
      const pendingTotal = m.pending.reduce((s,p)=>s+(p.amount||0),0);
      const monthTotal = receivedTotal + pendingTotal;
      const pct = monthTotal > 0 ? Math.round((receivedTotal/monthTotal)*100) : 0;
      const isPast = new Date(k+'-28') < new Date();
      return `
      <div class="cashflow-month">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="cashflow-month-title">${m.label}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">&#8377;${Number(monthTotal).toLocaleString()}</div>
        </div>
        <div class="cashflow-bar"><div class="cashflow-bar-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div class="meta" style="color:var(--green-light)">&#10003; &#8377;${Number(receivedTotal).toLocaleString()} received</div>
          <div class="meta" style="${pendingTotal>0?'color:var(--gold)':'color:var(--gray)'}">&#8377;${Number(pendingTotal).toLocaleString()} ${isPast&&pendingTotal>0?'overdue':'expected'}</div>
        </div>
        ${m.received.length+m.pending.length > 0 ? `
        <div style="margin-top:10px;border-top:1px solid #1a1a1a;padding-top:10px">
          ${[...m.received,...m.pending].map(p=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #141414">
            <div style="font-size:13px">${p.clients?p.clients.name:'Past client'} <span class="meta">· ${p.notes||''}</span></div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:13px">&#8377;${Number(p.amount||0).toLocaleString()}</span>
              <span class="badge badge-${p.status==='received'?'paid':'pending'}">${p.status}</span>
              ${p.status==='pending'?`<button class="btn btn-primary btn-sm" onclick="markPaid('${p.id}')">Mark Received</button>`:''}
            </div>
          </div>`).join('')}
        </div>` : ''}
      </div>`;
    }).join('')}
  `;
}

// =====================
// CONTRACT RENEWAL ALERTS
// =====================
function checkRenewals(clients) {
  const now = new Date();
  const in30 = new Date(now.getTime() + 30 * 86400000);
  return (clients||[]).filter(c => {
    if(!c.contract_end) return false;
    const end = new Date(c.contract_end);
    return end >= now && end <= in30;
  });
}
